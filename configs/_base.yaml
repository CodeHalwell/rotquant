# Shared defaults. Per-experiment YAMLs override the relevant keys.
# Debug on a fast model (Llama-3.2-1B / Qwen2.5-1.5B), then run the meaningful
# model (Llama-2-7B/13B). Run E1/E5/E6 with >=3 seeds and report mean +/- std.
model: meta-llama/Llama-2-7b-hf
device: cuda
dtype: float16
seed: 0
n_calib: 128
calib_seq_len: 2048
eval:
  perplexity: true
  ppl_datasets: [wikitext2, c4]
  ppl: {seq_len: 2048}
  zeroshot: false
  tasks: [arc_challenge, arc_easy, boolq, piqa, winogrande, hellaswag]
