# E4b: TurboQuant per-row scale vs rms per-group baseline at equal code bits (this row).
#
# TurboQuant's scale efficiency: after randomised Hadamard the distribution shape
# is universal, so one scale per output row suffices.  For a 4096-dim layer the
# overhead is 16/4096 ≈ 0.004 bpw vs 16/128 = 0.125 bpw for per-group.
#
# Compare against (separate configs):
#   e4_scale_group.yaml -- rms per-group scale, 3 bits, g=128 (3.125 bpw control)
#   e3b_turboquant_bias.yaml -- turboquant + QJL sketch k=64
experiment: E4b
run_id: e4b_turboquant_vs_rms

model: facebook/opt-125m
device: cuda
dtype: float16
seed: 42

quant:
  bits: 3
  codebook: gaussian
  scale: turboquant
  group_size: 128
  error_comp: none
  scale_bits: 0.0

patch:
  rotation: fwht
  block: 128
  mode: consistent

eval:
  perplexity: true
  ppl_datasets: [wikitext2, c4]
  zeroshot: false
